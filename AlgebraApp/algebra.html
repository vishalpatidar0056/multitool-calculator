<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra Module</title>
    
    <!-- Google Fonts: Space Grotesk -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="algebra-style.css">
    <script src="algebra-script.js" defer></script> 
</head>
<body>
    <div class="dashboard">
<!-- Dark/Light Mode Button -->
<button id="theme-toggle" class="theme-btn" aria-label="Toggle Theme">
    <img id="theme-icon" src="../icons/light-mode.png" alt="Theme" width="24" height="24">
</button>
        <header>
            <h1>Algebra & Solvers</h1>
            <p>Module 9 of the Super App</p>
        </header>

        <div class="tools-grid">
            <!-- Tool 1: Quadratic Equation Root Finder -->
            <div class="tool-card">
                <h2>Quadratic Roots (ax² + bx + c = 0)</h2>
                <div class="row-inputs">
                    <div class="input-group">
                        <label>a =</label>
                        <input type="number" id="quad-a" placeholder="e.g., 1">
                    </div>
                    <div class="input-group">
                        <label>b =</label>
                        <input type="number" id="quad-b" placeholder="e.g., -5">
                    </div>
                    <div class="input-group">
                        <label>c =</label>
                        <input type="number" id="quad-c" placeholder="e.g., 6">
                    </div>
                </div>
                <button class="btn accent" id="btn-quad">Find Roots (x)</button>
                <div class="result-box" id="quad-result">Result will appear here</div>
            </div>

            <!-- Tool 2: System of Linear Equations (2 Variables) -->
            <div class="tool-card">
                <h2>Solve for X and Y</h2>
                <p style="color: var(--text-secondary); margin-bottom: 15px; font-size: 0.9rem;">
                    Eq 1: a₁x + b₁y = c₁ <br> Eq 2: a₂x + b₂y = c₂
                </p>
                <div class="row-inputs">
                    <div class="input-group">
                        <label>Eq 1: a₁, b₁, c₁</label>
                        <div style="display: flex; gap: 5px;">
                            <input type="number" id="sys-a1" placeholder="a₁">
                            <input type="number" id="sys-b1" placeholder="b₁">
                            <input type="number" id="sys-c1" placeholder="c₁">
                        </div>
                    </div>
                </div>
                <div class="row-inputs">
                    <div class="input-group">
                        <label>Eq 2: a₂, b₂, c₂</label>
                        <div style="display: flex; gap: 5px;">
                            <input type="number" id="sys-a2" placeholder="a₂">
                            <input type="number" id="sys-b2" placeholder="b₂">
                            <input type="number" id="sys-c2" placeholder="c₂">
                        </div>
                    </div>
                </div>
                <button class="btn accent" id="btn-sys">Solve System</button>
                <div class="result-box" id="sys-result">Result will appear here</div>
            </div>

            <!-- Tool 3: Coordinate Algebra -->
            <div class="tool-card full-width">
                <h2>Coordinate Algebra</h2>
                <div class="row-inputs">
                    <div class="input-group">
                        <label>Point 1 (x₁, y₁):</label>
                        <div style="display: flex; gap: 5px;">
                            <input type="number" id="coord-x1" placeholder="x₁">
                            <input type="number" id="coord-y1" placeholder="y₁">
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Point 2 (x₂, y₂):</label>
                        <div style="display: flex; gap: 5px;">
                            <input type="number" id="coord-x2" placeholder="x₂">
                            <input type="number" id="coord-y2" placeholder="y₂">
                        </div>
                    </div>
                </div>
                <button class="btn accent" id="btn-coord">Calculate Line Properties</button>
                <div class="result-box" id="coord-result">Result will appear here</div>
            </div>
        </div>
    </div>
</body>
</html>
