<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health & Chemistry Module</title>
    <link rel="stylesheet" href="health-style.css">
    <script src="health-script.js" defer></script> <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">

</head>
<body>
    <div class="dashboard">
<!-- Dark/Light Mode Button -->
<button id="theme-toggle" class="theme-btn" aria-label="Toggle Theme">
    <img id="theme-icon" src="../icons/light-mode.png" alt="Theme" width="24" height="24">
</button>
        <header>
            <h1>BMI Calculator</h1>
            <p>MADE BY LUFFY </p>
        </header>

        <div class="tools-grid">
            <!-- Tool 1: BMI Calculator -->
            <div class="tool-card">
                <h2>BMI Calculator</h2>
                <div class="input-group">
                    <label>Height (cm):</label>
                    <input type="number" id="bmi-height" placeholder="e.g., 175">
                </div>
                <div class="input-group">
                    <label>Weight (kg):</label>
                    <input type="number" id="bmi-weight" placeholder="e.g., 70">
                </div>
                <button class="btn accent" id="btn-bmi">Calculate BMI</button>
                <div class="result-box" id="bmi-result">Result will appear here</div>
            </div>

            <!-- Tool 2: BMR Calculator -->
            <div class="tool-card">
                <h2>BMR Calculator (Mifflin-St Jeor)</h2>
                <div class="row-inputs">
                    <div class="input-group">
                        <label>Gender:</label>
                        <select id="bmr-gender">
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Age (years):</label>
                        <input type="number" id="bmr-age" placeholder="e.g., 20">
                    </div>
                </div>
                <div class="row-inputs">
                    <div class="input-group">
                        <label>Height (cm):</label>
                        <input type="number" id="bmr-height" placeholder="e.g., 175">
                    </div>
                    <div class="input-group">
                        <label>Weight (kg):</label>
                        <input type="number" id="bmr-weight" placeholder="e.g., 70">
                    </div>
                </div>
                <button class="btn accent" id="btn-bmr">Calculate BMR</button>
                <div class="result-box" id="bmr-result">Result will appear here</div>
            </div>

            <!-- Tool 3: Molarity Calculator -->
            <div class="tool-card">
                <h2>Solution Molarity</h2>
                <div class="input-group">
                    <label>Mass of Solute (g):</label>
                    <input type="number" id="mol-mass" placeholder="e.g., 58.44">
                </div>
                <div class="input-group">
                    <label>Molar Mass (g/mol):</label>
                    <input type="number" id="mol-molar-mass" placeholder="e.g., 58.44 (for NaCl)">
                </div>
                <div class="input-group">
                    <label>Volume of Solution (Liters):</label>
                    <input type="number" id="mol-volume" placeholder="e.g., 1.0">
                </div>
                <button class="btn accent" id="btn-mol">Calculate Molarity</button>
                <div class="result-box" id="mol-result">Result will appear here</div>
            </div>
        </div>
    </div>
</body>
</html>
