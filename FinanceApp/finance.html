<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Tools Module</title>
    <link rel="stylesheet" href="finance-style.css">
    <script src="finance-script.js" defer></script> <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard">
<!-- Dark/Light Mode Button -->
<button id="theme-toggle" class="theme-btn" aria-label="Toggle Theme">
    <img id="theme-icon" src="../icons/light-mode.png" alt="Theme" width="24" height="24">
</button>
        <header>
            <h1>Financial Tools</h1>
            <p>MADE BY LUFFY </p>
        </header>

        <div class="tools-grid">
            <!-- Tool 1: Compound Interest -->
            <div class="tool-card">
                <h2>Compound Interest</h2>
                <div class="input-group">
                    <label>Principal Amount (Initial Investment):</label>
                    <input type="number" id="ci-principal" placeholder="e.g., 100000">
                </div>
                <div class="row-inputs">
                    <div class="input-group">
                        <label>Annual Interest Rate (%):</label>
                        <input type="number" id="ci-rate" placeholder="e.g., 12">
                    </div>
                    <div class="input-group">
                        <label>Time Period (Years):</label>
                        <input type="number" id="ci-time" placeholder="e.g., 5">
                    </div>
                </div>
                <div class="input-group">
                    <label>Compounding Frequency:</label>
                    <select id="ci-frequency">
                        <option value="1">Annually (Once a year)</option>
                        <option value="2">Semi-Annually (Twice a year)</option>
                        <option value="4">Quarterly (4 times a year)</option>
                        <option value="12">Monthly (12 times a year)</option>
                    </select>
                </div>
                <button class="btn accent" id="btn-ci">Calculate Returns</button>
                <div class="result-box" id="ci-result">Result will appear here</div>
            </div>

            <!-- Tool 2: SIP Calculator -->
            <div class="tool-card">
                <h2>SIP Calculator</h2>
                <div class="input-group">
                    <label>Monthly Investment Amount:</label>
                    <input type="number" id="sip-amount" placeholder="e.g., 5000">
                </div>
                <div class="row-inputs">
                    <div class="input-group">
                        <label>Expected Return Rate (% p.a.):</label>
                        <input type="number" id="sip-rate" placeholder="e.g., 12">
                    </div>
                    <div class="input-group">
                        <label>Time Period (Years):</label>
                        <input type="number" id="sip-time" placeholder="e.g., 10">
                    </div>
                </div>
                <button class="btn accent" id="btn-sip">Calculate Wealth</button>
                <div class="result-box" id="sip-result">Result will appear here</div>
            </div>

            <!-- Tool 3: EMI Calculator -->
            <div class="tool-card emi-card">
                <h2>Loan EMI Calculator</h2>
                <div class="input-group">
                    <label>Loan Amount (Principal):</label>
                    <input type="number" id="emi-principal" placeholder="e.g., 500000">
                </div>
                <div class="row-inputs">
                    <div class="input-group">
                        <label>Annual Interest Rate (%):</label>
                        <input type="number" id="emi-rate" placeholder="e.g., 8.5">
                    </div>
                    <div class="input-group">
                        <label>Loan Tenure:</label>
                        <div style="display: flex; gap: 5px;">
                            <input type="number" id="emi-time" placeholder="e.g., 5" style="flex: 2;">
                            <select id="emi-time-type" style="flex: 1;">
                                <option value="years">Years</option>
                                <option value="months">Months</option>
                            </select>
                        </div>
                    </div>
                </div>
                <button class="btn accent" id="btn-emi">Calculate EMI</button>
                <div class="result-box" id="emi-result">Result will appear here</div>
            </div>
        </div>
    </div>
</body>
</html>
