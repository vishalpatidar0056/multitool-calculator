<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Validator</title>
    <link rel="stylesheet" href="json-validator.css">
    <script src="json-validator.js" defer></script>
</head>
<body>
    <!-- Standardized Isolated Theme Button -->
    <button id="theme-toggle" class="theme-btn" aria-label="Toggle Theme">
        <img id="theme-icon" src="../icons/light-mode.png" alt="Theme" width="24" height="24">
    </button>

    <div class="app-container">
        <header>
            <h1 data-text="JSON Validator">JSON Validator</h1>
            <p>Check and Debug JSON Syntax</p>
        </header>

        <div class="tools-grid">
            <div class="tool-card full-width">
                <div class="panel-header">
                    <h2>Input JSON</h2>
                    <div class="header-actions">
                        <button class="btn secondary small-btn" id="btn-clear">Clear</button>
                        <button class="btn secondary small-btn copy-btn" data-copy="json-input">Copy</button>
                    </div>
                </div>
                
                <textarea id="json-input" placeholder='Paste your JSON here to validate...&#10;Example: {"status": "success", "code": 200}'></textarea>
                
                <button class="btn accent full-btn" id="btn-validate">Validate JSON</button>

                <!-- Status Output Banner -->
                <div id="validation-result" class="result-banner" style="display: none;">
                    <div class="status-icon" id="status-icon"></div>
                    <div class="status-content">
                        <h3 id="status-title">Status</h3>
                        <p id="status-message">Message details will appear here.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
