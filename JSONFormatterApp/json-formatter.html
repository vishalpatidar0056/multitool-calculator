<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Formatter</title>
    <link rel="stylesheet" href="json-formatter.css">
    <script src="json-formatter.js" defer></script>
</head>
<body>
    <!-- Standardized Isolated Theme Button -->
    <button id="theme-toggle" class="theme-btn" aria-label="Toggle Theme">
        <img id="theme-icon" src="../icons/light-mode.png" alt="Theme" width="24" height="24">
    </button>

    <div class="app-container">
        <header>
            <h1 data-text="JSON Formatter">JSON Formatter</h1>
            <p>Beautify and Structure JSON Data</p>
        </header>

        <div class="tools-grid">
            <div class="tool-card full-width">
                <div class="code-workspace">
                    
                    <!-- Input Section -->
                    <div class="code-panel">
                        <div class="panel-header">
                            <h2>Raw JSON</h2>
                            <button class="btn secondary small-btn" id="btn-clear">Clear</button>
                        </div>
                        <textarea id="json-input" placeholder='Paste your minified or raw JSON here...&#10;Example: {"name":"John","age":30,"city":"New York"}'></textarea>
                        <button class="btn accent full-btn" id="btn-format">Format JSON</button>
                    </div>

                    <!-- Output Section -->
                    <div class="code-panel">
                        <div class="panel-header">
                            <h2>Formatted Output</h2>
                            <button class="btn accent small-btn copy-btn" data-copy="json-output">Copy</button>
                        </div>
                        <textarea id="json-output" readonly placeholder="Your formatted JSON will appear here..."></textarea>
                        
                        <!-- Error Message Box -->
                        <div id="error-msg" class="error-msg" style="display: none;"></div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</body>
</html>
