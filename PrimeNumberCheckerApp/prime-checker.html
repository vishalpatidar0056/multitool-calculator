<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Number Checker</title>
    <link rel="stylesheet" href="prime-checker.css">
    <script src="prime-checker.js" defer></script>
</head>
<body>
    <!-- Standardized Isolated Theme Button -->
    <button id="theme-toggle" class="theme-btn" aria-label="Toggle Theme">
        <img id="theme-icon" src="../icons/light-mode.png" alt="Theme" width="24" height="24">
    </button>

    <div class="app-container">
        <header>
            <h1 data-text="Prime Checker">Prime Checker</h1>
            <p>Instant Prime Verification</p>
        </header>

        <div class="tools-grid">
            <div class="tool-card">
                <h2>Check a Number</h2>
                
                <div class="input-group">
                    <label>Enter any positive integer</label>
                    <input type="number" id="prime-input" placeholder="e.g. 997" min="1">
                </div>

                <button class="btn accent" id="btn-check">Verify Prime</button>
                
                <div class="result-box" id="prime-result">
                    Enter a number to check if it is prime.
                </div>
            </div>
        </div>
    </div>
</body>
</html>
