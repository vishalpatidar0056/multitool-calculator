<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Converter Module</title>
    <link rel="stylesheet" href="converter-style.css">
    <script src="converter-script.js" defer></script> <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard">
<!-- Dark/Light Mode Button -->
<button id="theme-toggle" class="theme-btn" aria-label="Toggle Theme">
    <img id="theme-icon" src="../icons/light-mode.png" alt="Theme" width="24" height="24">
</button>
        <header>
            <h1>Unit Converter</h1>
            <p>MADE BY LUFFY </p>
        </header>

        <div class="tools-grid">
            <!-- Tool 1: Length Converter -->
            <div class="tool-card">
                <h2>Length</h2>
                <div class="input-group">
                    <label>Amount:</label>
                    <input type="number" id="len-input" placeholder="e.g., 10">
                </div>
                <div class="row-inputs">
                    <div class="input-group">
                        <label>From:</label>
                        <select id="len-from">
                            <option value="m">Meters (m)</option>
                            <option value="km">Kilometers (km)</option>
                            <option value="cm">Centimeters (cm)</option>
                            <option value="mm">Millimeters (mm)</option>
                            <option value="mi">Miles (mi)</option>
                            <option value="yd">Yards (yd)</option>
                            <option value="ft">Feet (ft)</option>
                            <option value="in">Inches (in)</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>To:</label>
                        <select id="len-to">
                            <option value="ft">Feet (ft)</option>
                            <option value="m">Meters (m)</option>
                            <option value="km">Kilometers (km)</option>
                            <option value="cm">Centimeters (cm)</option>
                            <option value="mm">Millimeters (mm)</option>
                            <option value="mi">Miles (mi)</option>
                            <option value="yd">Yards (yd)</option>
                            <option value="in">Inches (in)</option>
                        </select>
                    </div>
                </div>
                <button class="btn accent" id="btn-length">Convert Length</button>
                <div class="result-box" id="len-result">Result will appear here</div>
            </div>

            <!-- Tool 2: Weight Converter -->
            <div class="tool-card">
                <h2>Weight & Mass</h2>
                <div class="input-group">
                    <label>Amount:</label>
                    <input type="number" id="wt-input" placeholder="e.g., 50">
                </div>
                <div class="row-inputs">
                    <div class="input-group">
                        <label>From:</label>
                        <select id="wt-from">
                            <option value="kg">Kilograms (kg)</option>
                            <option value="g">Grams (g)</option>
                            <option value="mg">Milligrams (mg)</option>
                            <option value="lb">Pounds (lb)</option>
                            <option value="oz">Ounces (oz)</option>
                            <option value="ton">Metric Tons (t)</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>To:</label>
                        <select id="wt-to">
                            <option value="lb">Pounds (lb)</option>
                            <option value="kg">Kilograms (kg)</option>
                            <option value="g">Grams (g)</option>
                            <option value="mg">Milligrams (mg)</option>
                            <option value="oz">Ounces (oz)</option>
                            <option value="ton">Metric Tons (t)</option>
                        </select>
                    </div>
                </div>
                <button class="btn accent" id="btn-weight">Convert Weight</button>
                <div class="result-box" id="wt-result">Result will appear here</div>
            </div>

            <!-- Tool 3: Temperature Converter -->
            <div class="tool-card">
                <h2>Temperature</h2>
                <div class="input-group">
                    <label>Amount:</label>
                    <input type="number" id="temp-input" placeholder="e.g., 98.6">
                </div>
                <div class="row-inputs">
                    <div class="input-group">
                        <label>From:</label>
                        <select id="temp-from">
                            <option value="C">Celsius (°C)</option>
                            <option value="F" selected>Fahrenheit (°F)</option>
                            <option value="K">Kelvin (K)</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>To:</label>
                        <select id="temp-to">
                            <option value="C" selected>Celsius (°C)</option>
                            <option value="F">Fahrenheit (°F)</option>
                            <option value="K">Kelvin (K)</option>
                        </select>
                    </div>
                </div>
                <button class="btn accent" id="btn-temp">Convert Temperature</button>
                <div class="result-box" id="temp-result">Result will appear here</div>
            </div>
        </div>
    </div>
</body>
</html>
