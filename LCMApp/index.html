<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LCM Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <!-- Standardized Isolated Theme Button -->
    <button id="theme-toggle" class="theme-btn" aria-label="Toggle Theme">
        <img id="theme-icon" src="../icons/light-mode.png" alt="Theme" width="24" height="24">
    </button>

    <div class="app-container">
        <header>
            <h1 data-text="LCM Calculator">LCM Calculator</h1>
            <p>Least Common Multiple Engine</p>
        </header>

        <div class="tools-grid">
            <div class="tool-card">
                <h2>Calculate LCM</h2>
                
                <div class="input-group">
                    <label>Enter numbers (comma-separated)</label>
                    <input type="text" id="lcm-input" placeholder="e.g. 12, 15, 20">
                </div>

                <button class="btn accent" id="btn-calc">Find LCM</button>
                
                <div class="result-box" id="lcm-result">
                    Enter two or more numbers to calculate their Least Common Multiple.
                </div>
            </div>
        </div>
    </div>
</body>
</html>
